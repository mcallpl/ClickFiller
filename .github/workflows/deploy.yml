name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test & Build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint || true
        continue-on-error: true

      - name: Run tests
        run: npm test -- --coverage || true
        continue-on-error: true

      - name: Build frontend
        run: npm run build

      - name: Build Docker image
        run: docker build -t clickfiller:${{ github.sha }} -t clickfiller:latest .

      - name: Test Docker image
        run: |
          docker run --rm -d --name test-container \
            -e ANTHROPIC_API_KEY=test-key \
            -p 3001:3001 \
            clickfiller:latest
          sleep 5
          curl -f http://localhost:3001/health || exit 1
          docker stop test-container || true

      - name: Build success notification
        if: success()
        run: |
          echo "✓ Build successful"
          echo "Image: clickfiller:${{ github.sha }}"
          echo "Image: clickfiller:latest"

      - name: Build failure notification
        if: failure()
        run: |
          echo "✗ Build failed"
          exit 1

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    name: Deploy to Production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "Deployment ready for:"
          echo "- Image tag: clickfiller:${{ github.sha }}"
          echo "- Manual deployment via Digital Ocean App Platform or custom deployment script"
          echo "- Run: scripts/deploy.sh to deploy locally or to Digital Ocean"

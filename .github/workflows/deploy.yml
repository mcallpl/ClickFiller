name: Build & Deploy to GoDaddy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static frontend
        run: npx vite build

      - name: Copy API to dist
        run: cp -r api/ dist/api/

      - name: Generate config.php from secret
        run: |
          cat > dist/api/config.php << 'PHPEOF'
          <?php
          $ANTHROPIC_API_KEY = '${{ secrets.ANTHROPIC_API_KEY }}';
          PHPEOF

      - name: Deploy to GoDaddy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/ClickFiller/
          dangerous-clean-slate: false

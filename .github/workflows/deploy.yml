name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static frontend
        run: npx vite build

      - name: Copy API to dist
        run: cp -r api/ dist/api/

      - name: Deploy via rsync over SSH
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          REMOTE_HOST: 64.227.108.128
          REMOTE_USER: root
          SOURCE: dist/
          TARGET: /var/www/html/ClickFiller/
          EXCLUDE: >-
            .git/,
            .github/,
            .DS_Store
